{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 80px auto;">
    <div style="text-align: center; margin-bottom: 30px;">
        <div style="font-size: 42px; font-weight: bold; color: var(--navy);">Yahtou</div>
        <div style="color: var(--muted); font-size: 14px; margin-top: 4px;">
            Portail d'administration — IEEE 802.1X
        </div>
    </div>
    <div class="card">
        <h2>Connexion administrateur</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
        </form>
    </div>
    <div style="text-align: center; color: var(--muted); font-size: 12px; margin-top: 16px;">
        ESP/UCAD — DIC2-SSI — Accès réservé aux administrateurs
    </div>
</div>
{% endblock %}
