{% extends "base.html" %}
{% block title %}Erreur {{ code }}{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 80px auto; text-align: center;">
    <div style="font-size: 72px; font-weight: bold; color: var(--navy);">{{ code }}</div>
    <p style="color: var(--muted); font-size: 16px; margin: 16px 0 28px;">{{ message }}</p>
    <a href="{{ url_for('dashboard') }}" class="btn" style="text-decoration: none;">Retour au tableau de bord</a>
</div>
{% endblock %}
